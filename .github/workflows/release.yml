name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────
  # Build signed release APK + upload to Play
  # ────────────────────────────────────────────
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      VERSION_NAME: ${{ github.ref_name }}
      BUILD_NUMBER: ${{ github.run_number }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.x"
          channel: stable
          cache: true

      - name: Set up Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Decode Android keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/android/keystore.jks

      - name: Flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON_PROD }}
        run: echo "$GOOGLE_SERVICES_JSON" > app/android/app/google-services.json

      - name: Fastlane beta
        env:
          STORE_FILE: ${{ github.workspace }}/app/android/keystore.jks
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
          VERSION_NAME: ${{ env.VERSION_NAME }}
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
        run: bundle exec fastlane beta

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.ref_name }}
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true

      - name: Post step summary
        if: always()
        run: |
          echo "## 🚀 Release ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ job.status == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Play Upload | ${{ job.status == 'success' && '✅ internal track' || '❌' }} |" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────
  # Terraform plan on release tag
  # ────────────────────────────────────────────
  terraform-plan:
    name: Terraform plan (prod)
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_PROD }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.x"

      - name: Terraform init
        working-directory: infra
        run: |
          terraform init \
            -backend-config=environments/prod/backend.tfvars

      - name: Terraform plan
        working-directory: infra
        run: |
          terraform plan \
            -var-file=environments/prod/terraform.tfvars \
            -var="billing_account=${{ secrets.GCP_BILLING_ACCOUNT }}" \
            -out=tfplan

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod-${{ github.ref_name }}
          path: infra/tfplan
          retention-days: 7
